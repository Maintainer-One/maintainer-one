<!DOCTYPE html>
<html>
<head>
<style>
.grid {
    display: grid;
    grid-template-columns: repeat(10, minmax(0, 1fr));
    grid-template-rows: repeat(10, minmax(0, 1fr));
    width: 380px;
    height: 380px;
    background: #000;
}
.cell-A { background-color: #ffb00055; }
.cell-B { background-color: #d946ef55; }
</style>
</head>
<body>
<div class="grid" id="g"></div>
<script>
const cmap = [
['A','A','A','A','A','B','B','B','B','B'],
['A','A','A','A','A','B','B','B','B','B'],
['A','A','A','A','A','B','B','B','B','B'],
['A','A','A','A','A','B','B','B','B','B'],
['A','A','A','A','A','B','B','B','B','B'],
['A','A','A','A','A','B','B','B','B','B'],
['A','A','A','A','A','B','B','B','B','B'],
['A','A','A','A','A','B','B','B','B','B'],
['A','A','A','A','A','B','B','B','B','B'],
['A','A','A','A','A','B','B','B','B','B']
];
let h = '';
for(let y=0; y<10; y++) {
    for(let x=0; x<10; x++) {
        h += `<div class="cell-${cmap[y][x]}"></div>`;
    }
}
document.getElementById('g').innerHTML = h;
</script>
</body>
</html>
